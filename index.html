<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love QR App</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:white}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111;padding:25px;border-radius:15px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px}
button{width:100%;padding:10px;background:#ff4081;color:white;border:none;border-radius:10px}
a{color:#ff4081;cursor:pointer}
#home{display:none;padding:20px}
#plus{position:fixed;bottom:20px;right:20px;background:#ff4081;padding:15px;border-radius:50%;font-size:22px}
#popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center}
#popupBox{background:#111;padding:20px;border-radius:15px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="box">
    <h2 id="title">Login</h2>
    <input id="name" placeholder="Name" style="display:none">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="auth()">Login</button>
    <p>Don't have account? <a onclick="toggle()">Signup</a></p>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <h2 style="text-align:center">My QR Codes</h2>
  <div id="list"></div>
  <div id="plus" onclick="openPopup()">+</div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3>Enter Text</h3>
    <input id="text1" placeholder="Main Text (required)">
    <input id="text2" placeholder="Optional Text 2">
    <input id="text3" placeholder="Optional Text 3">
    <br><br>
    <button onclick="generate()">Save</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
addDoc,
collection,
query,
where,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBvEa0kQxqD6qreUGhYwpXFLh9FQpBKtL0",
  authDomain: "love-animation-69d0b.firebaseapp.com",
  projectId: "love-animation-69d0b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = true;
let user;
let editId = null;

// toggle
window.toggle = ()=>{
isLogin=!isLogin;
title.innerText=isLogin?"Login":"Signup";
name.style.display=isLogin?"none":"block";
document.querySelector("button").innerText=isLogin?"Login":"Signup";
}

// auth
window.auth = ()=>{
const emailVal=email.value;
const passVal=pass.value;

if(isLogin){
signInWithEmailAndPassword(auth,emailVal,passVal)
.catch(e=>alert(e.message));
}else{
createUserWithEmailAndPassword(auth,emailVal,passVal)
.catch(e=>alert(e.message));
}
}

// auth state
onAuthStateChanged(auth,u=>{
if(u){
user=u;
loginPage.style.display="none";
home.style.display="block";
load();
}
});

// popup
window.openPopup=()=>{
popup.style.display="flex";
editId=null;
text1.value=""; text2.value=""; text3.value="";
}

// generate / update
window.generate=async()=>{
const t1=text1.value;
const t2=text2.value;
const t3=text3.value;

if(!t1){ alert("Main text required"); return; }

const link="https://123lider.io/love-animation/?t1="+
encodeURIComponent(t1)+"&t2="+encodeURIComponent(t2)+"&t3="+encodeURIComponent(t3);

if(editId){
await updateDoc(doc(db,"links",editId),{t1,t2,t3,link});
}else{
await addDoc(collection(db,"links"),{t1,t2,t3,link,uid:user.uid});
}

popup.style.display="none";
}

// edit
window.edit=(id,t1v,t2v,t3v)=>{
popup.style.display="flex";
text1.value=t1v;
text2.value=t2v;
text3.value=t3v;
editId=id;
}

// load
function load(){
const q=query(collection(db,"links"),where("uid","==",user.uid));

onSnapshot(q,snap=>{
list.innerHTML="";
snap.forEach(d=>{
const data=d.data();

list.innerHTML+=`
<div style="margin:20px;text-align:center">
<p>${data.t1}</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${data.link}">
<br>
<a href="${data.link}" target="_blank">Open</a>
<br><br>
<button onclick="edit('${d.id}','${data.t1}','${data.t2}','${data.t3}')">Edit</button>
</div>
`;
});
});
}
</script>

</body>
</html>
