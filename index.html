<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love QR App</title>

<style>
body{
margin:0;font-family:sans-serif;background:#0f0f0f;color:white;
}

.center{
display:flex;justify-content:center;align-items:center;height:100vh;
}

.box{
background:#111;padding:25px;border-radius:15px;width:300px;text-align:center;
}

input{
width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px;
}

button{
width:100%;padding:10px;background:#ff4081;color:white;border:none;border-radius:10px;
}

a{color:#ff4081;cursor:pointer}

#home{display:none;padding:20px}

#plus{
position:fixed;bottom:20px;right:20px;
background:#ff4081;padding:15px;border-radius:50%;
font-size:22px;cursor:pointer;
}

#popup{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:#000a;
justify-content:center;align-items:center;
}

#popupBox{
background:#111;padding:20px;border-radius:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="box">
    <h2 id="title">Login</h2>

    <input id="name" placeholder="Name" style="display:none">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="auth()">Login</button>

    <p id="toggleText">
      Don't have account? <a onclick="toggle()">Signup</a>
    </p>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <h2 style="text-align:center">My QR Codes</h2>
  <div id="list"></div>

  <div id="plus" onclick="openPopup()">+</div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3>Enter Text</h3>
    <input id="textInput" placeholder="I love you Onima">
    <br><br>
    <button onclick="generate()">Generate</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
addDoc,
collection,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBvEa0kQxqD6qreUGhYwpXFLh9FQpBKtL0",
  authDomain: "love-animation-69d0b.firebaseapp.com",
  databaseURL: "https://love-animation-69d0b-default-rtdb.firebaseio.com",
  projectId: "love-animation-69d0b",
  storageBucket: "love-animation-69d0b.firebasestorage.app",
  messagingSenderId: "161341842078",
  appId: "1:161341842078:web:5eaedb0abefa28d307118f",
  measurementId: "G-D46BQSJBLP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = true;
let user;

// toggle
window.toggle = () => {
isLogin = !isLogin;

document.getElementById("title").innerText =
isLogin ? "Login" : "Signup";

document.getElementById("name").style.display =
isLogin ? "none" : "block";

document.querySelector("button").innerText =
isLogin ? "Login" : "Signup";
};

// auth
window.auth = () => {

const emailVal = document.getElementById("email").value;
const passVal = document.getElementById("pass").value;

if (isLogin) {

signInWithEmailAndPassword(auth, emailVal, passVal)
.catch(e => alert(e.message));

} else {

const nameVal = document.getElementById("name").value;

createUserWithEmailAndPassword(auth, emailVal, passVal)
.then(() => {
alert("Signup Success");
})
.catch(e => alert(e.message));
}
};

// auth state
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;
document.getElementById("loginPage").style.display = "none";
document.getElementById("home").style.display = "block";
load();
}
});

// popup
window.openPopup = () => {
document.getElementById("popup").style.display = "flex";
};

// generate QR link
window.generate = async () => {

const text = document.getElementById("textInput").value;

const link =
"https://123lider.github.io/love-animation/?text=" +
encodeURIComponent(text);

await addDoc(collection(db, "links"), {
text,
link,
uid: user.uid
});

document.getElementById("popup").style.display = "none";
};

// load data
function load() {
const q = query(collection(db, "links"), where("uid", "==", user.uid));

onSnapshot(q, (snap) => {
const list = document.getElementById("list");
list.innerHTML = "";

snap.forEach((d) => {
const data = d.data();

list.innerHTML += `
<div style="margin:20px;text-align:center">
<p>${data.text}</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${data.link}">
<br>
<a href="${data.link}" target="_blank">Open</a>
</div>
`;
});
});
}
</script>

</body>
</html>
